name: Build Prism image

# Builds the slim (Node-only) Prism image for linux/amd64 and pushes it to
# GitHub Container Registry, so low-RAM hosts can pull instead of building.

on:
  push:
    branches: [main]
    paths:
      - "prism/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push slim image
        uses: docker/build-push-action@v6
        with:
          context: ./prism
          file: ./prism/Dockerfile.slim
          platforms: linux/amd64
          push: true
          tags: ghcr.io/faiz9771/prism:slim
