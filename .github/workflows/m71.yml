name: Build M7.1 scanner image

# Builds the M7.1-Long scanner (Flask backend + dashboard) as a multi-arch image
# (linux/amd64 + linux/arm64) and pushes it to GHCR, so it runs on both the x86
# E2 micro and the ARM A1 box. The VM pulls; it never builds.

on:
  push:
    branches: [main]
    paths:
      - "Breakout/M7.1-Testing/**"
      - ".github/workflows/m71.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # arm64 is built under QEMU emulation, so multi-arch builds take longer.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push M7.1 image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./Breakout/M7.1-Testing
          file: ./Breakout/M7.1-Testing/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/faiz9771/m71:latest
