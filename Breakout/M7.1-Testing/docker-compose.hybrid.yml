# Hybrid deployment: the Oracle VM PULLS the prebuilt image from GHCR (built by
# .github/workflows/m71.yml for linux/amd64) and runs it — no build on the box.
# Runs beside Prism (Prism owns 3000; M7.1 owns 5050).
#
#   On the VM:  docker compose -f docker-compose.hybrid.yml up -d
#   then open:  https://m71long.duckdns.org   (clean HTTPS via the caddy service)
#               http://<vm-ip>:5050           (direct, still works as a fallback)
services:
  m71:
    image: ghcr.io/faiz9771/m71:latest
    pull_policy: always
    # Bound to loopback only: the app is reachable from the internet ONLY through
    # the auth-gated caddy service. (Caddy still reaches it over the compose
    # network at m71:5050.) For a local SSH-tunnel fallback: ssh -L 5050:127.0.0.1:5050
    ports:
      - "127.0.0.1:5050:5050"
    environment:
      PORT: 5050
      M71_DATA_DIR: /app/data
    volumes:
      - m71_scan_cache:/app/.scan_cache
      - m71_fii_cache:/app/.fii_cache
      - ./data:/app/data
    restart: unless-stopped

  # Reverse proxy → free auto-HTTPS for https://m71long.duckdns.org. Tiny
  # (~15MB RAM) alpine image; reaches the app over the compose network at
  # m71:5050. Cert is persisted in the caddy_data volume across restarts.
  caddy:
    image: caddy:2-alpine
    pull_policy: always
    depends_on:
      - m71
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  m71_scan_cache:
  m71_fii_cache:
  caddy_data:
  caddy_config:
